name: Actualizar Noticias

on:
  schedule:
    - cron: '0 9 * * *'    # Todos los días a las 6:00 AM hora Argentina (UTC-3)
  workflow_dispatch:        # También disponible manual desde GitHub

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install anthropic feedparser Pillow numpy

      - name: Correr script de noticias
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_TOKEN: ${{ secrets.FACEBOOK_PAGE_TOKEN }}
          FACEBOOK_APP_ID: ${{ secrets.FACEBOOK_APP_ID }}
          FACEBOOK_APP_SECRET: ${{ secrets.FACEBOOK_APP_SECRET }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
        run: python3 actualizar_noticias.py

      - name: Publicar cambios
        run: |
          git config user.name "GLOBALpatagonia Bot"
          git config user.email "bot@globalpatagonia.org"
          git add noticias.json noticias_ayer.json historial.json agenda.json fotos/ propios.json propios_historial.json deportes_feed.json negocios.json turismo.json cultura.json telegram_state.json sitemap.xml feed.xml
          git ls-files --others --exclude-standard notas/ | xargs -r git add --
          git diff --staged --quiet || git commit -m "Noticias actualizadas — $(date +'%d/%m/%Y')"
          git push

      - name: Esperar propagación GitHub Pages
        run: sleep 90

      - name: Publicar tapa e informes en Instagram
        env:
          FACEBOOK_PAGE_TOKEN: ${{ secrets.FACEBOOK_PAGE_TOKEN }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
        run: python3 actualizar_noticias.py --solo-instagram

      - name: Guardar estado Instagram
        run: |
          git config user.name "GLOBALpatagonia Bot"
          git config user.email "bot@globalpatagonia.org"
          git add telegram_state.json
          git diff --staged --quiet || git commit -m "Estado Instagram — $(date +'%d/%m/%Y')"
          git push
