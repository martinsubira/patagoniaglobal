name: Actualizar Noticias

on:
  schedule:
    - cron: '0 11 * * *'   # Todos los días a las 8:00 AM hora Argentina (UTC-3) → listo ~8:10
  workflow_dispatch:        # También disponible manual desde GitHub

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install anthropic feedparser Pillow numpy

      - name: Correr script de noticias
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_TOKEN: ${{ secrets.FACEBOOK_PAGE_TOKEN }}
        run: python3 actualizar_noticias.py

      - name: Publicar cambios
        run: |
          git config user.name "PatagoniaGLOBAL Bot"
          git config user.email "bot@patagoniaglobal.ar"
          git add noticias.json historial.json agenda.json fotos/ propios.json propios_historial.json deportes_feed.json negocios.json turismo.json telegram_state.json
          git diff --staged --quiet || git commit -m "Noticias actualizadas — $(date +'%d/%m/%Y')"
          git push
