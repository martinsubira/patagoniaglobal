name: Actualizar Noticias

on:
  schedule:
    - cron: '45 10 * * *'  # Todos los días a las 7:45 AM hora Argentina (UTC-3)
  workflow_dispatch:         # También permite correrlo manualmente desde GitHub

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install anthropic feedparser

      - name: Correr script de noticias
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: python3 actualizar_noticias.py

      - name: Publicar cambios
        run: |
          git config user.name "PatagoniaGLOBAL Bot"
          git config user.email "bot@patagoniaglobal.ar"
          git add noticias.json historial.json agenda.json fotos/ propios.json
          git diff --staged --quiet || git commit -m "Noticias actualizadas — $(date +'%d/%m/%Y')"
          git push
