<script>
function getParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

function switchLang(l) {
  const url = new URL(window.location.href);
  url.searchParams.set('lang', l);
  window.location.href = url.toString();
}

function tiempoLectura(texto) {
  const palabras = (texto || "").trim().split(/\s+/).length;
  const minutos = Math.max(1, Math.round(palabras / 200));
  return minutos + " min de lectura";
}

function normTag(t) {
  return (t || '').replace(/medio ambiente/gi, 'Ambiente');
}

function bandera(pais) {
  if (pais === 'chile') return '🇨🇱 Chile';
  if (pais === 'ambos') return '🇦🇷🇨🇱 Argentina · Chile';
  if (pais === 'argentina') return '🇦🇷 Argentina';
  return '🌎 Patagonia';
}

function renderRelacionadas(data, idActual) {
  const todas = [
    data.tapa,
    ...(data.secundarias || []),
    ...(data.noticias || []),
    ...(data.historias || [])
  ].filter(n => n && n.id !== idActual);

  const elegidas = todas.sort(() => Math.random() - 0.5).slice(0, 3);
  if (!elegidas.length) return "";

  const cards = elegidas.map(n => {
    const img = n.imagen
      ? `<img class="rel-img" src="${n.imagen}" alt="${n.titulo}" onerror="this.style.display='none'">`
      : `<div class="rel-img"></div>`;
    return `
      <div class="rel-card" onclick="location.href='nota.html?id=${n.id}'">
        ${img}
        <div class="rel-body">
          <div class="rel-tag">${normTag(n.tag) || "Patagonia"}</div>
          <div class="rel-titulo">${n.titulo}</div>
        </div>
      </div>`;
  }).join("");

  return `
    <div class="relacionadas">
      <div class="relacionadas-titulo">También te puede interesar</div>
      <div class="relacionadas-grid">${cards}</div>
    </div>`;
}

function renderNota(nota, fechaDisplay, data) {
  // Fecha en top bar
  const fechaEl = document.getElementById("fecha-display");
  if (fechaEl && fechaDisplay) fechaEl.textContent = fechaDisplay + " · Patagonia Argentina y Chilena";

  // Título de pestaña y OG dinámico
  document.title = nota.titulo + " — GLOBALpatagonia";
  const setMeta = (sel, val) => { const el = document.querySelector(sel); if (el && val) el.setAttribute("content", val); };
  // Imagen absoluta para SEO
  const imgAbsoluta = nota.imagen
    ? (nota.imagen.startsWith('http') ? nota.imagen : 'https://globalpatagonia.org/' + nota.imagen)
    : 'https://globalpatagonia.org/fotos/torres-del-paine.webp';

  setMeta('meta[property="og:title"]', nota.titulo + " — GLOBALpatagonia");
  setMeta('meta[property="og:description"]', nota.bajada || nota.titulo);
  setMeta('meta[property="og:image"]', imgAbsoluta);
  setMeta('meta[property="og:url"]', window.location.href);
  setMeta('meta[name="description"]', nota.bajada || nota.titulo);
  setMeta('meta[name="twitter:title"]', nota.titulo + " — GLOBALpatagonia");
  setMeta('meta[name="twitter:description"]', nota.bajada || nota.titulo);
  setMeta('meta[name="twitter:image"]', imgAbsoluta);
  const canonical = document.querySelector('link[rel="canonical"]');
  if (canonical) canonical.href = window.location.href;

  // JSON-LD dinámico para Google
  const jsonld = document.getElementById("jsonld-nota");
  if (jsonld) {
    const schema = {
      "@context": "https://schema.org",
      "@type": nota.categoria === 'turismo' ? "TravelAction" : "NewsArticle",
      "headline": nota.titulo,
      "description": nota.bajada || nota.titulo,
      "url": window.location.href,
      "datePublished": nota.fecha || new Date().toISOString().split('T')[0],
      "dateModified": nota.fecha || new Date().toISOString().split('T')[0],
      "inLanguage": "es-AR",
      "image": { "@type": "ImageObject", "url": imgAbsoluta },
      "articleSection": nota.categoria || "general",
      "keywords": ["patagonia", nota.categoria, nota.tag, "GLOBALpatagonia"].filter(Boolean).join(", "),
      "publisher": {
        "@type": "NewsMediaOrganization",
        "name": "GLOBALpatagonia",
        "url": "https://globalpatagonia.org/",
        "logo": { "@type": "ImageObject", "url": "https://globalpatagonia.org/favicon.svg" }
      },
      "author": { "@type": "Organization", "name": nota.fuente || "GLOBALpatagonia" }
    };
    jsonld.textContent = JSON.stringify(schema);
  }

  // Imagen
  let imgHtml = "";
  if (nota.imagen) {
    imgHtml = `<div class="nota-imagen-wrap"><img class="nota-imagen" src="${nota.imagen}" alt="${nota.titulo}" onerror="this.parentElement.style.display='none'"></div>`;
  } else {
    imgHtml = `<div class="nota-imagen-placeholder"></div>`;
  }

  // Idioma
  const lang = getParam('lang') || 'es';
  if (lang !== 'es') {
    if (nota['titulo_' + lang]) nota = { ...nota, titulo: nota['titulo_' + lang] };
    if (nota['bajada_' + lang]) nota = { ...nota, bajada: nota['bajada_' + lang] };
    if (nota['cuerpo_' + lang]) nota = { ...nota, cuerpo: nota['cuerpo_' + lang] };
  }

  // Cuerpo — detecta subtítulos y los renderiza como h3, intercalando fotos de galería
  // Bloques que empiezan con < se renderizan como HTML crudo (tablas, cards, etc.)
  const parrafos = (nota.cuerpo || "").split(/\n\n+/).filter(p => p.trim());
  const fotos = nota.galeria || [];
  let fotoIdx = 0;

  // Agrupar por secciones (cada h3 inicia una nueva sección)
  let secciones = [];
  let secActual = [];
  parrafos.forEach(p => {
    const t = p.trim();
    if (t.startsWith('<')) {
      if (secActual.length > 0) { secciones.push(secActual); secActual = []; }
      secciones.push([{ tipo: 'raw', texto: t }]);
      return;
    }
    const esH3 = t.length < 90 && !t.endsWith('.') && !t.endsWith(',') && !t.endsWith('?') && !t.startsWith('"') && !t.match(/^\d/);
    if (esH3 && secActual.length > 0) {
      secciones.push(secActual);
      secActual = [{ tipo: 'h3', texto: t }];
    } else {
      secActual.push({ tipo: esH3 ? 'h3' : 'p', texto: t });
    }
  });
  if (secActual.length) secciones.push(secActual);

  // Calcular cada cuántas secciones intercalar una foto
  const intervalo = fotos.length > 0 ? Math.max(1, Math.floor(secciones.length / (fotos.length + 1))) : 999;

  let cuerpoHtml = "";
  secciones.forEach((sec, i) => {
    sec.forEach(item => {
      cuerpoHtml += item.tipo === 'raw' ? item.texto : item.tipo === 'h3' ? `<h3>${item.texto}</h3>` : `<p>${item.texto}</p>`;
    });
    // Intercalar foto después de la sección correspondiente (no al final)
    if (fotoIdx < fotos.length && (i + 1) % intervalo === 0 && i < secciones.length - 1) {
      cuerpoHtml += `<figure class="foto-inline"><img src="${fotos[fotoIdx]}" loading="lazy" alt="${nota.titulo}" onerror="this.parentElement.style.display='none'"></figure>`;
      fotoIdx++;
    }
  });

  // Fotos restantes al final si no se intercalaron todas
  let galeriaHtml = "";
  if (fotoIdx < fotos.length) {
    const restantes = fotos.slice(fotoIdx).map(src =>
      `<img src="${src}" alt="${nota.titulo}" loading="lazy" onerror="this.style.display='none'">`
    ).join("");
    galeriaHtml = `<div class="nota-galeria">${restantes}</div>`;
  }

  // Datos clave destacados
  let datosHtml = "";
  if (nota.datos_clave && nota.datos_clave.length) {
    const items = nota.datos_clave.map(d => `
      <div class="dato-item">
        <div class="dato-label">${d.label}</div>
        <div class="dato-valor">${d.valor}</div>
      </div>`).join("");
    datosHtml = `
      <div class="datos-clave">
        <div class="datos-clave-titulo">Datos clave</div>
        <div class="datos-clave-grid">${items}</div>
      </div>`;
  }

  // Compartir
  const url = encodeURIComponent(window.location.href);
  const titulo = encodeURIComponent(nota.titulo);
  const compartirHtml = `
    <div class="compartir">
      <span class="compartir-label">Compartir</span>
      <a class="btn-compartir btn-wa" href="https://wa.me/?text=${titulo}%20${url}" target="_blank" rel="noopener">WhatsApp</a>
      <a class="btn-compartir btn-x" href="https://twitter.com/intent/tweet?text=${titulo}&url=${url}" target="_blank" rel="noopener">X / Twitter</a>
      <button class="btn-compartir btn-copy" onclick="navigator.clipboard.writeText(window.location.href);this.textContent='¡Copiado!'">Copiar enlace</button>
    </div>`;

  const hasMultilang = nota.titulo_en || nota.titulo_pt;
  const langSwitcherHtml = hasMultilang ? `
    <div class="lang-switcher">
      <button class="lang-btn ${lang==='es'?'active':''}" onclick="switchLang('es')">ES</button>
      <button class="lang-btn ${lang==='en'?'active':''}" onclick="switchLang('en')">EN</button>
      <button class="lang-btn ${lang==='pt'?'active':''}" onclick="switchLang('pt')">PT</button>
    </div>` : '';

  document.getElementById("contenido").innerHTML = `
    ${langSwitcherHtml}
    <div class="nota-tag">${normTag(nota.tag) || "🗞️ Patagonia"}</div>
    <h1 class="nota-titulo">${nota.titulo}</h1>
    <div class="nota-bajada">${nota.bajada || ""}</div>
    <div class="nota-meta">
      <span>${bandera(nota.pais)}</span>
      <span>📰 ${nota.fuente || "Medios patagónicos"}</span>
      ${nota.autor ? `<span>✍️ ${nota.autor}</span>` : ""}
      <span>⏱ ${tiempoLectura(nota.cuerpo)}</span>
    </div>
    ${imgHtml}
    <div class="nota-cuerpo">${cuerpoHtml}</div>
    ${galeriaHtml}
    ${datosHtml}
    ${nota.propio
      ? `<div class="nota-fuente" style="border-left:3px solid #1c2d3d;background:#f0ede8;">
           <strong>Por ${nota.autor || "GLOBALpatagonia"}</strong> · Nota de producción propia · <strong>GLOBALpatagonia</strong>
         </div>`
      : `<div class="nota-fuente">
           <strong>Fuente original:</strong> Esta nota fue elaborada con información de <strong>${nota.fuente || "medios locales"}</strong>.
         </div>`
    }
    ${compartirHtml}
    ${renderRelacionadas(data, nota.id)}
  `;

  document.getElementById("loading").style.display = "none";
  document.getElementById("contenido").style.display = "block";
}

function buscarNota(data, id) {
  if (data.tapa && data.tapa.id === id) return data.tapa;
  for (const arr of ['secundarias', 'noticias', 'historias']) {
    if (data[arr]) {
      const n = data[arr].find(n => n.id === id);
      if (n) return n;
    }
  }
  return null;
}

const id = getParam("id");
if (!id) {
  document.getElementById("loading").textContent = "Nota no encontrada.";
} else {
  // Busca en noticias.json, historias.json, propios.json, negocios.json, turismo.json y historial.json
  Promise.all([
    fetch("noticias.json").then(r => r.json()).catch(() => ({})),
    fetch("historias.json").then(r => r.json()).catch(() => ({})),
    fetch("propios.json").then(r => r.json()).catch(() => ([])),
    fetch("turismo.json").then(r => r.json()).catch(() => ([])),
    fetch("historial.json").then(r => r.json()).catch(() => ([])),
    fetch("negocios.json").then(r => r.json()).catch(() => ([]))
  ]).then(([noticias, historias, propios, turismo, historial, negocios]) => {
    let nota = buscarNota(noticias, id);
    let data = noticias;
    if (!nota && historias.notas) {
      nota = historias.notas.find(n => n.id === id) || null;
      if (nota) data = { ...noticias, historias: historias.notas };
    }
    if (!nota && Array.isArray(propios)) {
      nota = propios.find(n => n.id === id) || null;
    }
    if (!nota && Array.isArray(negocios)) {
      nota = negocios.find(n => n.id === id) || null;
    }
    // Último recurso: buscar en historial completo (notas de deportes, manuales, etc.)
    if (!nota && Array.isArray(historial)) {
      nota = historial.find(n => n.id === id) || null;
    }
    // turismo.json solo tiene resúmenes — usar solo si historial tampoco tiene la nota
    if (!nota && Array.isArray(turismo)) {
      nota = turismo.find(n => n.id === id) || null;
    }
    // Si se encontró pero sin cuerpo, buscar versión completa en historial
    if (nota && !nota.cuerpo && Array.isArray(historial)) {
      const completa = historial.find(n => n.id === id);
      if (completa && completa.cuerpo) nota = completa;
    }
    if (nota) {
      renderNota(nota, noticias.fecha_display, { ...noticias, historias: historias.notas || [] });
    } else {
      document.getElementById("loading").textContent = "Nota no encontrada.";
    }
  }).catch(() => {
    document.getElementById("loading").textContent = "Error al cargar la nota.";
  });
}
</script>
