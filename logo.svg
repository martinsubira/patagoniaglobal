<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 1100 150" width="1100" height="150">

  <!-- Ícono: mix-blend-mode screen hace invisibles las áreas oscuras sobre fondo oscuro -->
  <image href="logo-icono.png" x="-20" y="-8" width="260" height="166"
         style="mix-blend-mode:screen"/>

  <!-- Texto: GLOBAL bold azul glacial -->
  <text y="106" font-size="80">
    <tspan x="208"
           font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
           font-weight="900"
           fill="#8ab8d4"
           letter-spacing="2">GLOBAL</tspan><tspan
           font-family="'Arial', 'Helvetica Neue', sans-serif"
           font-weight="300"
           fill="rgba(255,255,255,0.92)"
           letter-spacing="0.5">patagonia</tspan>
  </text>

  <!-- Línea separadora -->
  <line x1="208" y1="120" x2="1090" y2="120"
        stroke="#8ab8d4" stroke-width="1.2" stroke-opacity="0.4"/>

</svg>
