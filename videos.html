  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600;700&display=swap');

    :root {
      --negro: #141414;

<div id="lightbox">

<script>
const CATS = {
  ficcion:          "Ficción",
  serie_ficcion:    "Series de Ficción",
  documental:       "Documentales",
  serie_documental: "Series Documentales"
};
const CAT_ORDER = ["ficcion", "serie_ficcion", "documental", "serie_documental"];

function thumb(id)   { return `https://img.youtube.com/vi/${id}/hqdefault.jpg`; }
function thumbHD(id) { return `https://img.youtube.com/vi/${id}/maxresdefault.jpg`; }

// ── LIGHTBOX (video individual) ──
function abrirVideo(v) {
  document.getElementById("lb-iframe").src = `https://www.youtube.com/embed/${v.youtube_id}?autoplay=1`;
  document.getElementById("lb-titulo").textContent = v.titulo;
  document.getElementById("lb-desc").textContent = v.descripcion || "";
  document.getElementById("lb-meta").textContent = [v.lugar, v.año, v.duracion].filter(Boolean).join(" · ");
  document.getElementById("lightbox").classList.add("open");
  document.body.style.overflow = "hidden";
}
function cerrar() {
  document.getElementById("lb-iframe").src = "";
  document.getElementById("lightbox").classList.remove("open");
  document.body.style.overflow = "";
}
document.getElementById("lightbox").addEventListener("click", e => { if (e.target === e.currentTarget) cerrar(); });
document.addEventListener("keydown", e => { if (e.key === "Escape") { cerrar(); cerrarSerie(); } });

// ── SERIE DETAIL PANEL ──
function abrirSerie(s) {
  document.getElementById("sd-bg").style.backgroundImage = `url(${thumbHD(s.youtube_id)})`;
  document.getElementById("sd-badge").textContent = `${CATS[s.categoria]||'Serie'} · ${s.episodios.length} episodios`;
  document.getElementById("sd-titulo").textContent = s.titulo;
  document.getElementById("sd-desc").textContent = s.descripcion || "";
  document.getElementById("sd-meta").textContent = [s.año, s.lugar, s.produccion].filter(Boolean).join(" · ");

  const ep1 = s.episodios[0];
  document.getElementById("sd-play-btn").onclick = () => abrirVideo(ep1);

  const lista = document.getElementById("sd-ep-lista");
  lista.innerHTML = "";
  s.episodios.forEach((ep, i) => {
    const epTitulo = ep.titulo.replace(/^[^—–]+[—–]\s*/, "");
    const row = document.createElement("div");
    row.className = "ep-row";
    row.innerHTML = `
      <div class="ep-num">${ep.episodio || (i + 1)}</div>
      <div class="ep-thumb">
        <img src="${thumb(ep.youtube_id)}" loading="lazy" alt="${epTitulo}">
        <div class="ep-thumb-play">▶</div>
      </div>
      <div class="ep-body">
        <div class="ep-titulo">${epTitulo}</div>
        <div class="ep-desc">${ep.descripcion || ""}</div>
      </div>
      <div class="ep-dur">${ep.duracion || ""}</div>`;
    row.addEventListener("click", () => abrirVideo(ep));
    lista.appendChild(row);
  });

  document.getElementById("serie-detail").classList.add("open");
  document.getElementById("serie-detail").scrollTop = 0;
  document.body.style.overflow = "hidden";
}
function cerrarSerie() {
  document.getElementById("serie-detail").classList.remove("open");
  document.body.style.overflow = "";
}
document.getElementById("serie-detail").addEventListener("click", e => {
  if (e.target === document.getElementById("serie-detail")) cerrarSerie();
});

// Header scroll
window.addEventListener("scroll", () => {
  document.getElementById("main-header").classList.toggle("scrolled", window.scrollY > 50);
});

// ── AGRUPAR SERIES ──
// Agrupa episodios con el mismo campo `serie` en un único objeto, preservando orden
function agruparSeries(videos) {
  const seriesMap = {};
  const result = [];
  const seen = new Set();

  videos.forEach(v => {
    if (v.serie) {
      if (!seriesMap[v.serie]) {
        seriesMap[v.serie] = {
          _isSerie: true,
          titulo: v.serie,
          youtube_id: v.youtube_id, // primer encontrado = mejor thumbnail (ya ordenado en JSON)
          descripcion: v.serie_descripcion || v.descripcion,
          año: v.año,
          categoria: v.categoria,
          pais: v.pais,
          lugar: v.lugar,
          episodios: []
        };
      }
      seriesMap[v.serie].episodios.push(v);
    }
  });

  // Ordenar episodios por número
  Object.values(seriesMap).forEach(s => {
    s.episodios.sort((a, b) => (a.episodio || 0) - (b.episodio || 0));
  });

  // Reconstruir lista: una sola entrada por serie, en el lugar donde aparece la primera
  videos.forEach(v => {
    if (v.serie) {
      if (!seen.has(v.serie)) {
        seen.add(v.serie);
        result.push(seriesMap[v.serie]);
      }
    } else {
      result.push(v);
    }
  });
  return result;
}

// ── CARDS ──
function renderCard(item) {
  if (item._isSerie) return renderSerieCard(item);
  const el = document.createElement("div");
  el.className = "vcard";
  el.innerHTML = `
    <div class="vcard-thumb">
      <img src="${thumb(item.youtube_id)}" alt="${item.titulo}" loading="lazy">
    </div>
    <div class="vcard-info">
      <div class="vcard-cat">${CATS[item.categoria]||item.categoria}</div>
      <div class="vcard-titulo">${item.titulo}</div>
      <div class="vcard-desc">${item.descripcion||""}</div>
      <div class="vcard-meta">
        ${item.lugar?`<span>📍 ${item.lugar}</span>`:""}
        ${item.duracion?`<span>⏱ ${item.duracion}</span>`:""}
        ${item.año?`<span>${item.año}</span>`:""}
      </div>
    </div>`;
  el.addEventListener("click", () => abrirVideo(item));
  return el;
}

function renderSerieCard(s) {
  const el = document.createElement("div");
  el.className = "vcard";
  el.innerHTML = `
    <div class="vcard-thumb">
      <img src="${thumb(s.youtube_id)}" alt="${s.titulo}" loading="lazy">
      <div class="serie-badge-thumb">SERIE · ${s.episodios.length} ep.</div>
    </div>
    <div class="vcard-info">
      <div class="vcard-cat">${CATS[s.categoria]||s.categoria}</div>
      <div class="vcard-titulo">${s.titulo}</div>
      <div class="vcard-desc">${s.descripcion||""}</div>
      <div class="vcard-meta">
        ${s.lugar?`<span>📍 ${s.lugar}</span>`:""}
        ${s.año?`<span>${s.año}</span>`:""}
        <span>${s.episodios.length} episodios</span>
      </div>
    </div>`;
  el.addEventListener("click", () => abrirSerie(s));
  return el;
}

// ── CARRUSEL ──
let currentSlide = 0;
let carouselTimer = null;

function buildSlide(item) {
  const isSerie = item._isSerie;
  const el = document.createElement("div");
  el.className = "carousel-slide";
  el.innerHTML = `
    <div class="slide-bg" style="background-image:url(${thumbHD(item.youtube_id)})"></div>
    <div class="slide-content">
      <div class="hero-badge">${isSerie ? `${CATS[item.categoria]||'Serie'} · ${item.episodios.length} ep.` : (CATS[item.categoria]||item.categoria)}</div>
      <h1 class="hero-titulo">${item.titulo}</h1>
      <p class="hero-desc">${item.descripcion||""}</p>
      <div class="hero-meta">
        ${item.lugar?`<span>📍 ${item.lugar}</span>`:""}
        ${item.año?`<span>${item.año}</span>`:""}
        ${!isSerie && item.duracion?`<span>⏱ ${item.duracion}</span>`:""}
      </div>
      <div class="hero-btns">
        <button class="btn-play" id="hero-btn-${item.titulo.replace(/\s/g,'')}">▶ ${isSerie ? 'Ver serie' : 'Reproducir'}</button>
      </div>
    </div>`;
  const btn = el.querySelector(".btn-play");
  btn.addEventListener("click", () => isSerie ? abrirSerie(item) : abrirVideo(item));
  return el;
}

function goToSlide(n) {
  const slides = document.querySelectorAll(".carousel-slide");
  const dots   = document.querySelectorAll(".dot");
  slides[currentSlide].classList.remove("active");
  if (dots[currentSlide]) dots[currentSlide].classList.remove("active");
  currentSlide = (n + slides.length) % slides.length;
  slides[currentSlide].classList.add("active");
  if (dots[currentSlide]) dots[currentSlide].classList.add("active");
}
function startTimer() {
  clearInterval(carouselTimer);
  carouselTimer = setInterval(() => goToSlide(currentSlide + 1), 6000);
}
function buildCarousel(items) {
  const container = document.getElementById("carousel");
  container.innerHTML = "";
  items.forEach(item => container.appendChild(buildSlide(item)));
  if (items.length > 1) {
    const prev = document.createElement("button");
    prev.className = "carousel-arrow prev"; prev.innerHTML = "&#8249;";
    prev.addEventListener("click", () => { goToSlide(currentSlide - 1); startTimer(); });
    const next = document.createElement("button");
    next.className = "carousel-arrow next"; next.innerHTML = "&#8250;";
    next.addEventListener("click", () => { goToSlide(currentSlide + 1); startTimer(); });
    container.appendChild(prev);
    container.appendChild(next);
    const dotsEl = document.createElement("div");
    dotsEl.className = "carousel-dots";
    items.forEach((_, i) => {
      const d = document.createElement("div");
      d.className = "dot";
      d.addEventListener("click", () => { goToSlide(i); startTimer(); });
      dotsEl.appendChild(d);
    });
    container.appendChild(dotsEl);
  }
  document.querySelectorAll(".carousel-slide")[0].classList.add("active");
  const firstDot = document.querySelector(".dot");
  if (firstDot) firstDot.classList.add("active");
  container.addEventListener("mouseenter", () => clearInterval(carouselTimer));
  container.addEventListener("mouseleave", startTimer);
  if (items.length > 1) startTimer();
}

// ── MAIN ──
fetch("videos.json").then(r => r.json()).then(videos => {
  if (!videos.length) {
    document.getElementById("carousel").innerHTML = '<div class="empty">Próximamente...</div>';
    return;
  }

  const agrupados = agruparSeries(videos);

  // Carrusel: Rescatistas fijo (ahora como serie) + últimas 5 agrupadas
  const pinned = agrupados.find(v => v.titulo === "Rescatistas" || v.id === "rescatistas-ep01");
  const resto  = agrupados.filter(v => v !== pinned);
  const ultimas5 = resto.slice(-5);
  const enCarrusel = pinned ? [pinned, ...ultimas5] : ultimas5.slice(-6);
  buildCarousel(enCarrusel);

  // Filas por categoría (usando items agrupados)
  const porCat = {};
  agrupados.forEach(item => {
    const cat = item.categoria;
    if (!porCat[cat]) porCat[cat] = [];
    porCat[cat].push(item);
  });

  const filasEl = document.getElementById("filas");

  function crearFila(titulo, items) {
    const fila = document.createElement("div");
    fila.className = "fila";
    fila.innerHTML = `
      <div class="fila-header">
        <div class="fila-titulo">${titulo}</div>
        <div class="fila-arrows">
          <button class="fila-arrow arr-prev">&#8249;</button>
          <button class="fila-arrow arr-next">&#8250;</button>
        </div>
      </div>
      <div class="fila-scroll"></div>`;
    const scroll = fila.querySelector(".fila-scroll");
    items.forEach(item => scroll.appendChild(renderCard(item)));
    fila.querySelector(".arr-prev").addEventListener("click", () => scroll.scrollBy({ left: -480, behavior: "smooth" }));
    fila.querySelector(".arr-next").addEventListener("click", () => scroll.scrollBy({ left: 480, behavior: "smooth" }));
    return fila;
  }

  CAT_ORDER.forEach(cat => {
    const items = porCat[cat];
    if (!items || !items.length) return;
    filasEl.appendChild(crearFila(CATS[cat]||cat, items));
  });

  // Todo el catálogo
  if (agrupados.length > 1) filasEl.appendChild(crearFila("Todo el catálogo", agrupados));

}).catch(() => {
  document.getElementById("carousel").innerHTML = '<div class="empty">No se pudieron cargar los videos.</div>';
});
</script>
