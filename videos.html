<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PatagoniaGLOBAL — Cine & Documental Patagónico</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <link rel="canonical" href="https://patagoniaglobal.org/videos.html"/>
  <meta name="description" content="Series, ficciones y documentales filmados en la Patagonia argentina y chilena."/>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-5FP2F41BZG"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-5FP2F41BZG');</script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1924505291132800" crossorigin="anonymous"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600;700&display=swap');

    :root {
      --negro: #141414;
      --negro-card: #1f1f1f;
      --azul: #7aadcc;
      --blanco: #ffffff;
      --gris: rgba(255,255,255,0.55);
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior: smooth; }
    body { background: var(--negro); color: var(--blanco); font-family: 'Inter', sans-serif; overflow-x: hidden; }

    /* ── HEADER ── */
    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 0 40px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.85) 0%, transparent 100%);
      display: flex; align-items: center; justify-content: space-between;
      height: 68px;
      transition: background 0.3s;
    }
    header.scrolled { background: rgba(20,20,20,0.97); }
    .header-logo {
      font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 900;
      color: white; text-decoration: none; letter-spacing: -0.5px;
    }
    .header-logo span { color: var(--azul); }
    .header-nav { display: flex; gap: 24px; align-items: center; }
    .header-nav a {
      color: rgba(255,255,255,0.75); text-decoration: none; font-size: 13px;
      font-weight: 500; transition: color 0.2s;
    }
    .header-nav a:hover, .header-nav a.active { color: white; }
    .header-back {
      color: rgba(255,255,255,0.6); text-decoration: none; font-size: 13px;
      display: flex; align-items: center; gap: 6px; transition: color 0.2s;
    }
    .header-back:hover { color: white; }

    /* ── CARRUSEL HERO ── */
    .carousel {
      position: relative; height: 85vh; min-height: 500px;
      overflow: hidden;
    }

    /* slides */
    .carousel-slide {
      position: absolute; inset: 0;
      display: flex; align-items: flex-end;
      padding: 0 60px 80px;
      opacity: 0; transition: opacity 0.9s ease;
      pointer-events: none;
    }
    .carousel-slide.active { opacity: 1; pointer-events: auto; }

    .slide-bg {
      position: absolute; inset: 0;
      background-size: cover; background-position: center;
      background-color: #0a0a0a;
      transition: transform 8s ease;
    }
    .carousel-slide.active .slide-bg { transform: scale(1.04); }
    .slide-bg::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(to top, #141414 0%, rgba(20,20,20,0.45) 40%, transparent 70%),
                  linear-gradient(to right, rgba(20,20,20,0.82) 0%, transparent 62%);
    }

    /* content */
    .slide-content {
      position: relative; max-width: 560px;
      transform: translateY(16px); transition: transform 0.9s ease, opacity 0.9s ease;
      opacity: 0;
    }
    .carousel-slide.active .slide-content { transform: translateY(0); opacity: 1; }

    .hero-badge {
      display: inline-block; background: var(--azul); color: #1c2d3d;
      font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
      padding: 4px 12px; border-radius: 2px; margin-bottom: 16px;
    }
    .hero-titulo {
      font-family: 'Playfair Display', serif;
      font-size: clamp(32px, 5vw, 56px); font-weight: 900;
      line-height: 1.1; margin-bottom: 16px;
    }
    .hero-desc {
      font-size: 16px; line-height: 1.7;
      color: rgba(255,255,255,0.75); margin-bottom: 28px;
      max-width: 480px;
    }
    .hero-meta {
      font-size: 12px; color: rgba(255,255,255,0.5);
      margin-bottom: 24px; display: flex; gap: 16px; flex-wrap: wrap;
    }
    .hero-btns { display: flex; gap: 12px; flex-wrap: wrap; }
    .btn-play {
      display: flex; align-items: center; gap: 8px;
      background: white; color: #141414;
      border: none; border-radius: 4px;
      padding: 12px 28px; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: background 0.2s; font-family: 'Inter', sans-serif;
    }
    .btn-play:hover { background: rgba(255,255,255,0.85); }

    /* flechas */
    .carousel-arrow {
      position: absolute; top: 50%; transform: translateY(-50%);
      z-index: 20; background: rgba(0,0,0,0.45); border: 1px solid rgba(255,255,255,0.2);
      color: white; width: 48px; height: 48px; border-radius: 50%;
      font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, opacity 0.2s;
      opacity: 0.6;
    }
    .carousel-arrow:hover { background: rgba(0,0,0,0.75); opacity: 1; }
    .carousel-arrow.prev { left: 20px; }
    .carousel-arrow.next { right: 20px; }

    /* dots */
    .carousel-dots {
      position: absolute; bottom: 28px; right: 60px;
      display: flex; gap: 8px; z-index: 20;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: rgba(255,255,255,0.35); cursor: pointer;
      transition: background 0.3s, transform 0.3s;
    }
    .dot.active { background: white; transform: scale(1.3); }

    /* ── FILAS ── */
    .filas { padding: 0 40px 60px; }

    .fila { margin-bottom: 40px; }
    .fila-titulo {
      font-size: 16px; font-weight: 600; color: white;
      margin-bottom: 12px; letter-spacing: 0.3px;
    }
    .fila-scroll {
      display: flex; gap: 8px;
      overflow-x: auto; padding-bottom: 8px;
      scrollbar-width: none;
    }
    .fila-scroll::-webkit-scrollbar { display: none; }

    /* ── CARDS ── */
    .vcard {
      flex-shrink: 0;
      width: 220px;
      border-radius: 4px;
      overflow: visible;
      cursor: pointer;
      transition: transform 0.25s, z-index 0s 0.25s;
      position: relative;
      z-index: 1;
    }
    .vcard:hover {
      transform: scale(1.22);
      z-index: 10;
      transition: transform 0.25s, z-index 0s;
    }
    .vcard-thumb {
      position: relative; width: 100%;
      padding-bottom: 56.25%;
      background: #222; border-radius: 4px; overflow: hidden;
    }
    .vcard-thumb img {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover; display: block;
      transition: opacity 0.2s;
    }
    .vcard-thumb::after {
      content: '▶';
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; color: white;
      background: rgba(0,0,0,0.4);
      opacity: 0; transition: opacity 0.2s;
    }
    .vcard:hover .vcard-thumb::after { opacity: 1; }

    .vcard-info {
      background: #232323;
      padding: 12px 14px 14px;
      border-radius: 0 0 4px 4px;
      display: none;
    }
    .vcard:hover .vcard-info { display: block; }
    .vcard-titulo {
      font-size: 13px; font-weight: 700; color: white;
      line-height: 1.3; margin-bottom: 6px;
    }
    .vcard-desc {
      font-size: 11px; color: rgba(255,255,255,0.6);
      line-height: 1.5; margin-bottom: 8px;
      display: -webkit-box; -webkit-line-clamp: 3;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .vcard-meta {
      font-size: 10px; color: rgba(255,255,255,0.4);
      display: flex; gap: 10px; flex-wrap: wrap;
    }
    .vcard-cat {
      font-size: 9px; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; color: var(--azul); margin-bottom: 4px;
    }

    /* ── LIGHTBOX ── */
    #lightbox {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.93); z-index: 9999;
      align-items: center; justify-content: center;
      flex-direction: column; padding: 20px;
    }
    #lightbox.open { display: flex; }
    #lb-close {
      position: absolute; top: 20px; right: 28px;
      background: none; border: none; color: white;
      font-size: 36px; cursor: pointer; line-height: 1; opacity: 0.8;
      transition: opacity 0.2s;
    }
    #lb-close:hover { opacity: 1; }
    .lb-player {
      width: 100%; max-width: 900px;
    }
    .lb-ratio {
      position: relative; padding-bottom: 56.25%; height: 0;
      border-radius: 6px; overflow: hidden;
    }
    #lb-iframe {
      position: absolute; inset: 0; width: 100%; height: 100%;
      border: none;
    }
    #lb-info { max-width: 900px; width: 100%; margin-top: 20px; }
    #lb-titulo {
      font-family: 'Playfair Display', serif;
      font-size: clamp(18px, 3vw, 26px); font-weight: 700;
      margin-bottom: 8px;
    }
    #lb-desc { font-size: 14px; color: rgba(255,255,255,0.65); line-height: 1.65; }
    #lb-meta { font-size: 12px; color: rgba(255,255,255,0.35); margin-top: 8px; display: flex; gap: 16px; }

    /* ── EMPTY ── */
    .empty { text-align: center; padding: 80px 20px; color: rgba(255,255,255,0.25); font-size: 14px; }

    /* ── MOBILE ── */
    @media (max-width: 768px) {
      header { padding: 0 16px; height: 56px; }
      .header-logo { font-size: 22px; }
      .carousel-slide { padding: 0 20px 50px; }
      .carousel-dots { right: 20px; bottom: 16px; }
      .carousel-arrow { display: none; }
      .filas { padding: 0 12px 40px; }
      .vcard { width: 160px; }
      .vcard:hover { transform: scale(1.1); }
    }
  </style>
</head>
<body>

<header id="main-header">
  <a href="index.html" class="header-logo">Patagonia<span>GLOBAL</span></a>
  <div class="header-nav">
    <a href="index.html">Inicio</a>
    <a href="index.html#sec-noticias">Noticias</a>
    <a href="index.html#sec-agenda">Agenda</a>
    <a href="videos.html" class="active">Videos</a>
    <a href="acerca.html">Acerca de</a>
  </div>
</header>

<!-- CARRUSEL HERO -->
<div class="carousel" id="carousel">
  <div class="empty" style="padding:200px 0;text-align:center;">Cargando...</div>
</div>

<!-- FILAS -->
<div class="filas" id="filas"></div>

<!-- LIGHTBOX -->
<div id="lightbox">
  <button id="lb-close" onclick="cerrar()">✕</button>
  <div class="lb-player">
    <div class="lb-ratio">
      <iframe id="lb-iframe" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>
  </div>
  <div id="lb-info">
    <div id="lb-titulo"></div>
    <div id="lb-desc"></div>
    <div id="lb-meta"></div>
  </div>
</div>

<script>
const CATS = {
  ficcion:    "Ficción",
  documental: "Documental"
};

function thumb(id) { return `https://img.youtube.com/vi/${id}/hqdefault.jpg`; }
function thumbHD(id) { return `https://img.youtube.com/vi/${id}/maxresdefault.jpg`; }

function abrirVideo(v) {
  document.getElementById("lb-iframe").src = `https://www.youtube.com/embed/${v.youtube_id}?autoplay=1`;
  document.getElementById("lb-titulo").textContent = v.titulo;
  document.getElementById("lb-desc").textContent = v.descripcion || "";
  const meta = [v.lugar, v.año, v.duracion].filter(Boolean).join(" · ");
  document.getElementById("lb-meta").textContent = meta;
  document.getElementById("lightbox").classList.add("open");
  document.body.style.overflow = "hidden";
}

function cerrar() {
  document.getElementById("lb-iframe").src = "";
  document.getElementById("lightbox").classList.remove("open");
  document.body.style.overflow = "";
}

document.getElementById("lightbox").addEventListener("click", e => { if (e.target === e.currentTarget) cerrar(); });
document.addEventListener("keydown", e => { if (e.key === "Escape") cerrar(); });

// Header scroll
window.addEventListener("scroll", () => {
  document.getElementById("main-header").classList.toggle("scrolled", window.scrollY > 50);
});

// Render card
function renderCard(v) {
  const el = document.createElement("div");
  el.className = "vcard";
  el.innerHTML = `
    <div class="vcard-thumb">
      <img src="${thumb(v.youtube_id)}" alt="${v.titulo}" loading="lazy">
    </div>
    <div class="vcard-info">
      <div class="vcard-cat">${CATS[v.categoria]||v.categoria}</div>
      <div class="vcard-titulo">${v.titulo}</div>
      <div class="vcard-desc">${v.descripcion||""}</div>
      <div class="vcard-meta">
        ${v.lugar?`<span>📍 ${v.lugar}</span>`:""}
        ${v.duracion?`<span>⏱ ${v.duracion}</span>`:""}
        ${v.año?`<span>${v.año}</span>`:""}
      </div>
    </div>`;
  el.addEventListener("click", () => abrirVideo(v));
  return el;
}

// ── CARRUSEL ──
let carouselVideos = [];
let currentSlide = 0;
let carouselTimer = null;

function buildSlide(v) {
  const vJson = JSON.stringify(v).replace(/"/g,'&quot;');
  const el = document.createElement("div");
  el.className = "carousel-slide";
  el.innerHTML = `
    <div class="slide-bg" style="background-image:url(${thumbHD(v.youtube_id)})"></div>
    <div class="slide-content">
      <div class="hero-badge">${CATS[v.categoria]||v.categoria}</div>
      <h1 class="hero-titulo">${v.titulo}</h1>
      <p class="hero-desc">${v.descripcion||""}</p>
      <div class="hero-meta">
        ${v.lugar?`<span>📍 ${v.lugar}</span>`:""}
        ${v.año?`<span>${v.año}</span>`:""}
        ${v.duracion?`<span>⏱ ${v.duracion}</span>`:""}
      </div>
      <div class="hero-btns">
        <button class="btn-play" onclick="abrirVideo(JSON.parse(decodeURIComponent('${encodeURIComponent(JSON.stringify(v))}')))" >▶ Reproducir</button>
      </div>
    </div>`;
  return el;
}

function goToSlide(n) {
  const slides = document.querySelectorAll(".carousel-slide");
  const dots   = document.querySelectorAll(".dot");
  slides[currentSlide].classList.remove("active");
  if (dots[currentSlide]) dots[currentSlide].classList.remove("active");
  currentSlide = (n + slides.length) % slides.length;
  slides[currentSlide].classList.add("active");
  if (dots[currentSlide]) dots[currentSlide].classList.add("active");
}

function startTimer() {
  clearInterval(carouselTimer);
  carouselTimer = setInterval(() => goToSlide(currentSlide + 1), 6000);
}

function buildCarousel(videos) {
  const container = document.getElementById("carousel");
  container.innerHTML = "";

  videos.forEach(v => container.appendChild(buildSlide(v)));

  // Flechas (solo si > 1 video)
  if (videos.length > 1) {
    const prev = document.createElement("button");
    prev.className = "carousel-arrow prev"; prev.innerHTML = "&#8249;";
    prev.addEventListener("click", () => { goToSlide(currentSlide - 1); startTimer(); });

    const next = document.createElement("button");
    next.className = "carousel-arrow next"; next.innerHTML = "&#8250;";
    next.addEventListener("click", () => { goToSlide(currentSlide + 1); startTimer(); });

    container.appendChild(prev);
    container.appendChild(next);

    // Dots
    const dotsEl = document.createElement("div");
    dotsEl.className = "carousel-dots";
    videos.forEach((_, i) => {
      const d = document.createElement("div");
      d.className = "dot";
      d.addEventListener("click", () => { goToSlide(i); startTimer(); });
      dotsEl.appendChild(d);
    });
    container.appendChild(dotsEl);
  }

  // Activar primer slide
  document.querySelectorAll(".carousel-slide")[0].classList.add("active");
  const firstDot = document.querySelector(".dot");
  if (firstDot) firstDot.classList.add("active");

  // Pausar al hover
  container.addEventListener("mouseenter", () => clearInterval(carouselTimer));
  container.addEventListener("mouseleave", startTimer);

  if (videos.length > 1) startTimer();
}

// Cargar y renderizar
fetch("videos.json").then(r => r.json()).then(videos => {
  if (!videos.length) {
    document.getElementById("carousel").innerHTML = '<div class="empty">Próximamente...</div>';
    return;
  }

  carouselVideos = videos;
  buildCarousel(videos);

  // FILAS por categoría
  const porCat = {};
  videos.forEach(v => {
    if (!porCat[v.categoria]) porCat[v.categoria] = [];
    porCat[v.categoria].push(v);
  });

  const filasEl = document.getElementById("filas");

  if (videos.length > 1) {
    const filaAll = document.createElement("div");
    filaAll.className = "fila";
    filaAll.innerHTML = `<div class="fila-titulo">Todo el catálogo</div><div class="fila-scroll"></div>`;
    filasEl.appendChild(filaAll);
    const scrollAll = filaAll.querySelector(".fila-scroll");
    videos.forEach(v => scrollAll.appendChild(renderCard(v)));
  }

  Object.entries(porCat).forEach(([cat, vids]) => {
    if (vids.length < 1) return;
    const fila = document.createElement("div");
    fila.className = "fila";
    fila.innerHTML = `<div class="fila-titulo">${CATS[cat]||cat}</div><div class="fila-scroll"></div>`;
    filasEl.appendChild(fila);
    const scroll = fila.querySelector(".fila-scroll");
    vids.forEach(v => scroll.appendChild(renderCard(v)));
  });

}).catch(() => {
  document.getElementById("carousel").innerHTML = '<div class="empty">No se pudieron cargar los videos.</div>';
});
</script>

</body>
</html>
